<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Alliance - Hub</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/index.css">
</head>
<body class="bg-gray-800 min-h-screen flex items-center justify-center font-sans text-white">

    <div id="tela-inicial" class="tela ativa w-full flex justify-center items-center">
        <div class="grid grid-cols-2 grid-rows-2 w-[90vw] max-w-[400px] aspect-square bg-white gap-1 shadow-2xl rounded-lg overflow-hidden">

            <button onclick="changeScreen('tela-equipe')" class="bg-teal-500 hover:bg-teal-400 transition-colors flex flex-col items-center justify-center p-4 group">
                <i class="fa-solid fa-users text-5xl mb-3 icon-shadow group-hover:scale-110 transition-transform duration-200"></i>
                <span class="text-xl font-bold icon-shadow tracking-wide">Unidades</span>
            </button>

            <button onclick="changeScreen('tela-loja')" class="bg-green-500 hover:bg-green-400 transition-colors flex flex-col items-center justify-center p-4 group">
                <i class="fa-solid fa-store text-5xl mb-3 icon-shadow group-hover:scale-110 transition-transform duration-200"></i>
                <span class="text-xl font-bold icon-shadow tracking-wide">Loja</span>
            </button>

            <button onclick="changeScreen('tela-missoes')" class="bg-blue-500 hover:bg-blue-400 transition-colors flex flex-col items-center justify-center p-4 group">
                <i class="fa-solid fa-map-location-dot text-5xl mb-3 icon-shadow group-hover:scale-110 transition-transform duration-200"></i>
                <span class="text-xl font-bold icon-shadow tracking-wide">Missões</span>
            </button>

            <button onclick="changeScreen('tela-config')" class="bg-purple-600 hover:bg-purple-500 transition-colors flex flex-col items-center justify-center p-4 group">
                <i class="fa-solid fa-wrench text-5xl mb-3 icon-shadow group-hover:scale-110 transition-transform duration-200"></i>
                <span class="text-xl font-bold icon-shadow tracking-wide">Ajustes</span>
            </button>

        </div>
    </div>

    <div id="tela-equipe" class="tela w-full max-w-[1200px] flex flex-col p-6 mx-auto animate-fade-in">
        
        <div class="w-full flex justify-between items-center mb-6">
            <button onclick="changeScreen('tela-inicial')" class="bg-gray-600 hover:bg-gray-500 p-2 px-4 rounded font-bold shadow transition-colors">
                <i class="fa-solid fa-arrow-left mr-2"></i> Voltar
            </button>
            <h1 class="text-3xl font-bold tracking-wider">Formação da Equipe</h1>
        </div>

        <div class="flex flex-col md:flex-row gap-6 w-full items-start">
            <div id="lista-equipe" class="flex-1 grid grid-cols-1 lg:grid-cols-2 gap-4 w-full">
                </div>

            <div id="painel-detalhes" class="hidden w-full md:w-[350px] bg-gray-900 border border-gray-700 rounded-lg p-6 shadow-2xl flex flex-col items-center">
                </div>
        </div>

        <div class="w-full mt-8 bg-gray-900 border border-gray-700 rounded-lg p-6 shadow-xl flex flex-col items-center">
            <h3 class="text-gray-400 text-sm font-bold uppercase tracking-widest mb-4">Equipe Atual</h3>
            <div id="slots-equipe" class="flex gap-4">
                </div>
        </div>
        
    </div>

    <div id="tela-loja" class="tela w-full max-w-[1200px] flex flex-col p-6 mx-auto animate-fade-in">
        <div class="w-full flex justify-between items-center mb-6">
            <button onclick="changeScreen('tela-inicial')" class="bg-gray-600 hover:bg-gray-500 p-2 px-4 rounded font-bold shadow transition-colors">
                <i class="fa-solid fa-arrow-left mr-2"></i> Voltar
            </button>
            <div class="text-right">
                <h1 class="text-3xl font-bold tracking-wider">Recrutamento</h1>
                <p class="text-yellow-400 font-bold text-sm"><i class="fa-solid fa-coins mr-1"></i> Loja de Unidades</p>
            </div>
        </div>

        <div class="flex flex-col md:flex-row gap-6 w-full items-start">
            <div id="lista-loja" class="flex-1 grid grid-cols-1 lg:grid-cols-2 gap-4 w-full">
                </div>

            <div id="painel-detalhes-loja" class="hidden w-full md:w-[350px] bg-gray-900 border border-gray-700 rounded-lg p-6 shadow-2xl flex flex-col items-center sticky top-6">
                </div>
        </div>
    </div>

    <div id="tela-missoes" class="tela w-full max-w-[1200px] flex flex-col p-6 mx-auto animate-fade-in">
        <div class="w-full flex justify-between items-center mb-6">
            <button onclick="changeScreen('tela-inicial')" class="bg-gray-600 hover:bg-gray-500 p-2 px-4 rounded font-bold shadow transition-colors">
                <i class="fa-solid fa-arrow-left mr-2"></i> Voltar
            </button>
            <h1 class="text-3xl font-bold tracking-wider">Seleção de Mapa</h1>
        </div>

        <div id="lista-mapas" class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full">
            </div>
    </div>

    <div id="tela-mapa-interativo" class="tela w-full max-w-[1200px] flex flex-col p-6 mx-auto h-[90vh] animate-fade-in">
        <div class="w-full flex justify-between items-center mb-4 z-10 relative">
            <button onclick="changeScreen('tela-missoes')" class="bg-gray-600 hover:bg-gray-500 p-2 px-4 rounded font-bold shadow transition-colors">
                <i class="fa-solid fa-arrow-left mr-2"></i> Mapas
            </button>
            <h1 id="mapa-titulo" class="text-3xl font-bold tracking-wider text-green-400 text-shadow-sm">Nome do Mapa</h1>
        </div>

        <div id="mapa-container" class="relative flex-1 w-full bg-gray-900 rounded-xl overflow-hidden shadow-2xl border-2 border-green-700/50">
            </div>
    </div>

    <div id="tela-batalha" class="tela w-full max-w-[1200px] h-[90vh] mx-auto flex flex-col relative overflow-hidden rounded-xl shadow-2xl border-2 border-gray-700 animate-fade-in">
        
        <div class="absolute inset-0 z-0">
            <img id="battle-background" src="" class="w-full h-full object-cover" alt="Cenário de Batalha">
        </div>

        <div class="w-full flex justify-between items-start p-6 z-10 relative">
            <button onclick="changeScreen('tela-mapa-interativo')" class="bg-red-600 hover:bg-red-500 p-2 px-4 rounded font-bold shadow-lg transition-colors border border-red-400">
                <i class="fa-solid fa-person-running mr-2"></i> Fugir
            </button>
            
            <div class="bg-black/70 px-6 py-2 rounded-lg border border-gray-500 shadow-xl backdrop-blur-sm">
                <h2 id="battle-title" class="text-2xl font-bold text-white tracking-widest uppercase text-shadow-sm">Missão</h2>
                <div id="turn-order" class="flex justify-center gap-2 mt-2 py-2 px-4 bg-black/40 rounded-full border border-white/10 backdrop-blur-sm"></div>
            </div>
            
            <div class="w-[100px]"></div> </div>

        <div class="flex-1 flex justify-between items-center px-8 md:px-16 z-10 relative pb-10">
            
            <div id="player-units" class="flex flex-col justify-center items-start gap-12 w-1/3"></div>
            <div id="enemy-units" class="flex flex-col justify-center items-end gap-12 w-1/3"></div>

        </div>
        <div id="action-bar" class="absolute bottom-6 left-1/2 -translate-x-1/2 flex gap-4 z-30 bg-black/60 p-4 rounded-2xl border border-white/20 backdrop-blur-md hidden"></div>
    </div>

    <script src="js/characters.js"></script>
    <script src="js/maps.js"></script>
    <script src="js/team.js"></script>
    <script src="js/shop.js"></script>
    <script src="js/battle.js"></script>
    <script src="js/main.js"></script>

</body>
</html>
